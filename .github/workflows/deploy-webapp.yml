name: Deploy webapp to GitHub Pages

on:
  push:
    # Pages деплоится только с дефолтной ветки репозитория (ограничение
    # окружения github-pages), поэтому триггерим ровно на неё —
    # пуши в main (их собирает хостинг бота) не плодят падающих прогонов.
    branches:
      - claude/wareon-analytics-telegram-bot-axhp0d
    paths:
      - "webapp/**"
      - ".github/workflows/deploy-webapp.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp
      - id: deployment
        uses: actions/deploy-pages@v4
