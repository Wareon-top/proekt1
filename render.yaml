# Render Blueprint — разворачивает Wareon (бот + API + дашборд-данные) одним
# сервисом с общей базой Postgres. Подключи репозиторий на render.com → New →
# Blueprint, задай секреты (BOT_TOKEN, ANTHROPIC_API_KEY, WEBAPP_URL,
# API_PUBLIC_URL, CORS_ORIGINS) — и всё живёт на одном URL.
services:
  - type: web
    name: wareon
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m wareon.run
    healthCheckPath: /api/health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_MODEL
        value: claude-opus-4-8
      - key: WEBAPP_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: wareon-db
          property: connectionString

databases:
  - name: wareon-db
    plan: free
